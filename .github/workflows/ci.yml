name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vulnerability-scan:
    name: Container CVE gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Generate ephemeral CI secrets
        run: sh install.sh

      - name: Build application images
        run: docker compose --profile test build

      - name: Pull digest-pinned third-party images
        run: docker compose --profile test pull --ignore-buildable

      - name: Install Trivy 0.70.0 from a SHA-pinned action
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          version: v0.70.0
          cache: true

      - name: Fail on critical image vulnerabilities
        run: |
          docker compose --profile test config --images | sort -u > /tmp/pam-olive-images.txt
          while IFS= read -r image; do
            echo "::group::Trivy $image"
            trivy image --scanners vuln --severity CRITICAL --exit-code 1 "$image"
            echo "::endgroup::"
          done < /tmp/pam-olive-images.txt

  quality-and-tests:
    name: Quality and fast tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: sqlite:////tmp/pam-olive-ci.sqlite3
      DJANGO_SECRET_KEY: ci-only-secret-key-with-more-than-fifty-characters-never-use-in-production
      DJANGO_SETTINGS_MODULE: config.settings.test
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and development tools
        run: python -m pip install -e ".[dev]"

      - name: Check dependency consistency
        run: python -m pip check

      - name: Lint Python
        run: ruff check .

      - name: Check shell script syntax
        run: sh -n install.sh scripts/*.sh

      - name: Check Django configuration
        run: python manage.py check

      - name: Refuse missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations to the fast-test database
        run: python manage.py migrate --noinput

      - name: Run tests with coverage gate
        run: >-
          pytest --cov=pamolive --cov-report=term-missing
          --cov-report=xml:coverage.xml --cov-fail-under=90

      - name: Build documentation strictly
        run: mkdocs build --strict

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  compose:
    name: Compose, smoke test, backup and restore rehearsal
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Generate ephemeral CI secrets without starting services
        env:
          PAMOLIVE_BOOTSTRAP_PREPARE_ONLY: "true"
        run: sh scripts/bootstrap.sh

      - name: Validate Compose model
        run: docker compose config --quiet

      - name: Build PAM-olive images
        run: docker compose --profile test build

      - name: Start the full stack and wait for health checks
        shell: bash
        run: |
          docker compose up --detach
          mapfile -t long_running_services < <(
            docker compose config --services | grep -v '^recordings-init$'
          )
          docker compose up \
            --detach \
            --wait \
            --wait-timeout 240 \
            --no-deps \
            "${long_running_services[@]}"

      - name: Verify target-network isolation
        run: sh scripts/check-isolation.sh

      - name: Smoke-test PAM and dedicated RDP origins
        run: |
          curl --fail --silent --show-error http://127.0.0.1:8000/api/health/ready/
          curl --fail --silent --show-error --location http://127.0.0.1:8081/guacamole/ >/dev/null
          docker compose exec -T rdp-broker python -c \
            "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health/live/', timeout=3)"

      - name: Run the isolated test image
        run: docker compose --profile test run --rm test

      - name: Seed encrypted restore marker
        run: |
          docker compose exec -T web python manage.py shell <<'PY'
          from pamolive.accounts.models import User
          from pamolive.audit.services import record_event
          from pamolive.vault.models import PersonalVaultItem
          from pamolive.vault.services import VaultCipher

          user = User.objects.create_user(username="ci-restore-marker")
          cipher = VaultCipher()
          PersonalVaultItem.objects.create(
              owner=user,
              name="CI restore marker",
              item_type=PersonalVaultItem.ItemType.NOTE,
              encrypted_payload=cipher.encrypt_payload({"note": "ci-restore-fixture"}),
              encryption_key_id=cipher.active_key_id,
          )
          record_event(actor=user, action="restore.marker_created", resource=user)
          PY

      - name: Create and verify sealed backup
        run: |
          sh scripts/backup.sh "$RUNNER_TEMP/pam-olive-backup"
          sh scripts/verify-backup.sh "$RUNNER_TEMP/pam-olive-backup"

      - name: Restore into a separate ephemeral database and verify
        env:
          PAMOLIVE_RESTORE_REHEARSAL_ACK: ephemeral-ci-only
        run: >-
          sh scripts/restore-rehearsal.sh
          "$RUNNER_TEMP/pam-olive-backup"
          "pamolive_restore_rehearsal_${GITHUB_RUN_ID}"
          ci-restore-marker

      - name: Stop ephemeral CI stack
        if: always()
        run: docker compose down --volumes --remove-orphans
