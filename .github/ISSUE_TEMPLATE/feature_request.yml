name: Proposition d'évolution
description: Proposer une capacité ou une amélioration du produit
title: "[Feature] "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problème à résoudre
      description: Décrivez le besoin métier ou opérationnel, sans donnée réelle.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Solution proposée
    validations:
      required: true
  - type: textarea
    id: permissions
    attributes:
      label: Rôles et permissions concernés
      description: Qui peut voir, exécuter, approuver, auditer ou administrer cette fonction ?
    validations:
      required: true
  - type: textarea
    id: audit
    attributes:
      label: Audit et risques
      description: Quels événements doivent être tracés et quels abus faut-il empêcher ?
  - type: checkboxes
    id: safety
    attributes:
      label: Données sensibles
      options:
        - label: La proposition ne contient aucun secret ni détail d'un système réel.
          required: true
