name: Feature request
description: Propose a product capability or improvement
title: "[Feature] "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the business or operational need without real data.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: permissions
    attributes:
      label: Affected roles and permissions
      description: Who may view, run, approve, audit, or administer this feature?
    validations:
      required: true
  - type: textarea
    id: audit
    attributes:
      label: Audit and risks
      description: Which events must be recorded and which abuse cases must be prevented?
  - type: checkboxes
    id: safety
    attributes:
      label: Sensitive data
      options:
        - label: The proposal contains no secrets or details from a real system.
          required: true
