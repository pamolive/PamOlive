name: Bug report
description: Report reproducible behavior without sensitive data
title: "[Bug] "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Never report a vulnerability or secret here. Follow the private process in SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.2.0 or SHA
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - User interface
        - Product administration
        - Identity and RBAC
        - Policies and approvals
        - Vaults
        - Gateway and sessions
        - Audit
        - Docker and installation
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Use fake data only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed result
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Docker, and installation mode, without internal addresses.
  - type: checkboxes
    id: safety
    attributes:
      label: Sensitive data
      options:
        - label: I removed all secrets, credentials, internal addresses, and personal data.
          required: true
        - label: This report is not a security vulnerability.
          required: true
