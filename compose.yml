services:
  keyring-tls-init:
    build: ./keyring
    user: "0:0"
    command: ["python", "/app/init_keyring_tls.py"]
    network_mode: none
    environment:
      PAMOLIVE_RUNTIME_UID: "10001"
      PAMOLIVE_RUNTIME_GID: "10001"
    volumes:
      - keyring_data:/data
      - keyring_tls_server:/keyring-server-tls
      - keyring_tls_client:/keyring-client-tls
    read_only: true
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER]
    security_opt: ["no-new-privileges:true"]
    restart: "no"

  keyring:
    build: ./keyring
    environment:
      PAMOLIVE_KEYRING_TOKEN: ${PAMOLIVE_KEYRING_TOKEN:?PAMOLIVE_KEYRING_TOKEN must be configured}
      PAMOLIVE_KEYRING_RATE_LIMIT_PER_MINUTE: ${PAMOLIVE_KEYRING_RATE_LIMIT_PER_MINUTE:-1200}
      PAMOLIVE_KEYRING_DECRYPT_LIMIT_PER_MINUTE: ${PAMOLIVE_KEYRING_DECRYPT_LIMIT_PER_MINUTE:-300}
      PAMOLIVE_KEYRING_CRYPTO_BACKEND: ${PAMOLIVE_KEYRING_CRYPTO_BACKEND:-local}
      PAMOLIVE_VAULT_ADDR: ${PAMOLIVE_VAULT_ADDR:-}
      PAMOLIVE_VAULT_TRANSIT_MOUNT: ${PAMOLIVE_VAULT_TRANSIT_MOUNT:-transit}
      PAMOLIVE_VAULT_KEY_NAME: ${PAMOLIVE_VAULT_KEY_NAME:-pamolive}
      PAMOLIVE_VAULT_TOKEN_FILE: ${PAMOLIVE_VAULT_TOKEN_FILE:-/run/secrets/pamolive_vault_token}
      PAMOLIVE_VAULT_CA_PATH: ${PAMOLIVE_VAULT_CA_PATH:-}
      PAMOLIVE_VAULT_NAMESPACE: ${PAMOLIVE_VAULT_NAMESPACE:-}
      PAMOLIVE_VAULT_TIMEOUT_SECONDS: ${PAMOLIVE_VAULT_TIMEOUT_SECONDS:-5}
    volumes:
      - keyring_data:/data
      - keyring_tls_server:/run/keyring-server-tls:ro
      - keyring_tls_client:/run/keyring-client-tls:ro
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000", "--no-access-log", "--ssl-keyfile", "/run/keyring-server-tls/server.key", "--ssl-certfile", "/run/keyring-server-tls/server.crt", "--ssl-ca-certs", "/run/keyring-server-tls/ca.crt", "--ssl-cert-reqs", "2"]
    depends_on:
      keyring-tls-init: {condition: service_completed_successfully}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import ssl, urllib.request; c=ssl.create_default_context(cafile='/run/keyring-client-tls/ca.crt'); c.load_cert_chain('/run/keyring-client-tls/client.crt','/run/keyring-client-tls/client.key'); urllib.request.urlopen('https://127.0.0.1:8000/healthz', context=c, timeout=3)",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks: [internal]
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped

  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: pamolive/postgres:17-hardened
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pamolive}
      POSTGRES_USER: ${POSTGRES_USER:-pamolive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be configured}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]
    restart: unless-stopped

  redis-tls-init:
    build: ./keyring
    user: "0:0"
    environment:
      REDIS_RUNTIME_UID: ${PAMOLIVE_REDIS_RUNTIME_UID:-999}
      REDIS_RUNTIME_GID: ${PAMOLIVE_REDIS_RUNTIME_GID:-1000}
    command: ["python", "/app/init_redis_tls.py"]
    network_mode: none
    volumes:
      - redis_tls_server:/redis-server-tls
      - redis_tls_client:/redis-client-tls
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER]
    security_opt: ["no-new-privileges:true"]
    restart: "no"

  redis:
    image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be configured}
    command:
      - sh
      - -ec
      - >-
        exec redis-server --appendonly yes --port 0 --tls-port 6379
        --tls-cert-file /run/redis-tls/server.crt
        --tls-key-file /run/redis-tls/server.key
        --tls-ca-cert-file /run/redis-tls/ca.crt
        --tls-auth-clients no --requirepass "$${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
      - redis_tls_server:/run/redis-tls:ro
    depends_on:
      redis-tls-init: {condition: service_completed_successfully}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli --tls --cacert /run/redis-tls/ca.crt -h redis --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]
    restart: unless-stopped

  web:
    build: .
    env_file: .env
    environment:
      PAMOLIVE_TRUST_PROXY_HEADERS: "true"
      PAMOLIVE_KEYRING_URL: https://keyring:8000
      REDIS_URL: rediss://:${REDIS_PASSWORD:?REDIS_PASSWORD must be configured}@redis:6379/0
      REDIS_TLS_CA_PATH: /run/redis-tls/ca.crt
    command: ["sh", "-c", "python -m config.runtime_secrets && python manage.py migrate && daphne -b 0.0.0.0 -p 8000 config.asgi:application"]
    expose: ["8000"]
    depends_on:
      keyring: {condition: service_healthy}
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready/', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks: [frontend, internal]
    volumes:
      - redis_tls_client:/run/redis-tls:ro
      - keyring_tls_client:/run/keyring-tls:ro
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]

  recordings-init:
    image: python:3.12-alpine@sha256:6d43704baacd1bfbe7c295d7f13079d5d8104ed33568873133f8fc69980419df
    user: "0:0"
    environment:
      PAMOLIVE_RECORDING_DIR: /recordings
      PAMOLIVE_RECORDING_UID: "10001"
      PAMOLIVE_RECORDING_GID: "10001"
    command: ["/bin/sh", "/usr/local/bin/init-recordings.sh"]
    network_mode: none
    volumes:
      - recordings_data:/recordings
      - ./scripts/init-recordings.sh:/usr/local/bin/init-recordings.sh:ro
    read_only: true
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER]
    security_opt: ["no-new-privileges:true"]
    restart: "no"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    environment:
      PAMOLIVE_INTERNAL_URL: http://web:8000
      PAMOLIVE_GATEWAY_SHARED_KEY: ${PAMOLIVE_GATEWAY_SHARED_KEY:?PAMOLIVE_GATEWAY_SHARED_KEY must be configured}
      PAMOLIVE_RECORDING_KEY: ${PAMOLIVE_RECORDING_KEY:?PAMOLIVE_RECORDING_KEY must be configured}
      PAMOLIVE_RECORDING_DIR: /recordings
      PAMOLIVE_GATEWAY_ACCEPT_LEGACY_SIGNATURES: ${PAMOLIVE_GATEWAY_ACCEPT_LEGACY_SIGNATURES:-false}
      PAMOLIVE_GATEWAY_REPLAY_CACHE_URL: rediss://:${REDIS_PASSWORD:?REDIS_PASSWORD must be configured}@redis:6379/2
      PAMOLIVE_GATEWAY_REPLAY_CACHE_CA_PATH: /run/redis-tls/ca.crt
    expose: ["8001"]
    depends_on:
      recordings-init: {condition: service_completed_successfully}
      web: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health/live/', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks: [frontend, internal, targets]
    volumes:
      - recordings_data:/recordings
      - redis_tls_client:/run/redis-tls:ro
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped

  rdp-broker:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    command: ["daphne", "-b", "0.0.0.0", "-p", "8002", "pamolive.rdp.asgi:application"]
    environment:
      PAMOLIVE_INTERNAL_URL: http://web:8000
      PAMOLIVE_GATEWAY_SHARED_KEY: ${PAMOLIVE_GATEWAY_SHARED_KEY:?PAMOLIVE_GATEWAY_SHARED_KEY must be configured}
      PAMOLIVE_GUACAMOLE_JSON_KEY: ${PAMOLIVE_GUACAMOLE_JSON_KEY:?PAMOLIVE_GUACAMOLE_JSON_KEY must be configured}
      PAMOLIVE_GUACAMOLE_INTERNAL_URL: http://guacamole:8080/guacamole
      PAMOLIVE_RDP_LAUNCH_LIFETIME_SECONDS: "15"
    expose: ["8002"]
    depends_on:
      web: {condition: service_healthy}
      guacamole: {condition: service_healthy}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health/live/', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks: [frontend, internal, targets]
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped

  guacd:
    image: guacamole/guacd@sha256:8974eaa9ba32f713daf311e7cc8cd7e4cdfba1edea39eed75524e78ef4b08f4f
    expose: ["4822"]
    networks: [internal, targets]
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped

  guacamole:
    build:
      context: .
      dockerfile: Dockerfile.guacamole
    image: pamolive/guacamole:1.6.0-hardened
    environment:
      GUACD_HOSTNAME: guacd
      JSON_ENABLED: "true"
      JSON_SECRET_KEY: ${PAMOLIVE_GUACAMOLE_JSON_KEY:?PAMOLIVE_GUACAMOLE_JSON_KEY must be configured}
      REMOTE_IP_VALVE_ENABLED: "true"
      REMOTE_IP_VALVE_REMOTE_IP_HEADER: X-Forwarded-For
      REMOTE_IP_VALVE_PROTOCOL_HEADER: X-Forwarded-Proto
      REMOTE_IP_VALVE_INTERNAL_PROXIES: ${PAMOLIVE_GUACAMOLE_TRUSTED_PROXY_REGEX:-10\\.253\\.0\\.[0-9]+}
    expose: ["8080"]
    depends_on: [guacd]
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-ec",
          "exec 3<>/dev/tcp/127.0.0.1/8080",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [frontend, internal, targets]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped

  rdp-proxy:
    image: caddy@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    ports:
      - "${PAMOLIVE_RDP_HTTP_BIND:-127.0.0.1}:${PAMOLIVE_RDP_HTTP_PORT:-8081}:8081"
    volumes:
      - ./deploy/Caddyfile.rdp:/etc/caddy/Caddyfile:ro
    depends_on:
      rdp-broker: {condition: service_healthy}
      guacamole: {condition: service_healthy}
    networks: [frontend]
    read_only: true
    tmpfs:
      - /config:rw,noexec,nosuid,size=16m
      - /data:rw,noexec,nosuid,size=16m
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped

  proxy:
    image: caddy@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    ports:
      - "${PAMOLIVE_HTTP_BIND:-127.0.0.1}:${PAMOLIVE_HTTP_PORT:-8000}:8080"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      web: {condition: service_healthy}
      gateway: {condition: service_healthy}
    networks: [frontend]
    read_only: true
    tmpfs:
      - /config:rw,noexec,nosuid,size=16m
      - /data:rw,noexec,nosuid,size=16m
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    environment:
      PAMOLIVE_KEYRING_URL: https://keyring:8000
      REDIS_URL: rediss://:${REDIS_PASSWORD:?REDIS_PASSWORD must be configured}@redis:6379/0
      REDIS_TLS_CA_PATH: /run/redis-tls/ca.crt
    command: ["celery", "-A", "config", "worker", "-l", "INFO"]
    depends_on:
      keyring: {condition: service_healthy}
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    networks: [internal]
    volumes:
      - redis_tls_client:/run/redis-tls:ro
      - keyring_tls_client:/run/keyring-tls:ro
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]

  beat:
    build: .
    env_file: .env
    environment:
      PAMOLIVE_KEYRING_URL: https://keyring:8000
      REDIS_URL: rediss://:${REDIS_PASSWORD:?REDIS_PASSWORD must be configured}@redis:6379/0
      REDIS_TLS_CA_PATH: /run/redis-tls/ca.crt
    command:
      [
        "celery",
        "-A",
        "config",
        "beat",
        "-l",
        "INFO",
        "--schedule=/tmp/celerybeat-schedule",
      ]
    depends_on:
      keyring: {condition: service_healthy}
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    networks: [internal]
    volumes:
      - redis_tls_client:/run/redis-tls:ro
      - keyring_tls_client:/run/keyring-tls:ro
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]

  test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgresql://${POSTGRES_USER:-pamolive}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be configured}@postgres:5432/${POSTGRES_DB:-pamolive}
      DJANGO_SECRET_KEY: isolated-test-only-secret-key-not-for-production
    depends_on:
      postgres: {condition: service_healthy}
    command: ["pytest", "--cov=pamolive", "--cov-fail-under=90", "-q"]
    networks: [internal]

volumes:
  keyring_data:
  keyring_tls_server:
  keyring_tls_client:
  postgres_data:
  redis_data:
  redis_tls_server:
  redis_tls_client:
  recordings_data:

networks:
  frontend:
    internal: false
    ipam:
      config:
        - subnet: ${PAMOLIVE_FRONTEND_SUBNET:-10.253.0.0/24}
  internal:
    internal: true
    ipam:
      config:
        - subnet: ${PAMOLIVE_INTERNAL_SUBNET:-10.254.0.0/24}
  targets:
    internal: false
    ipam:
      config:
        - subnet: ${PAMOLIVE_TARGETS_SUBNET:-10.255.0.0/24}
